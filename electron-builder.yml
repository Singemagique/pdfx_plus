appId: com.pdfx.app
productName: PDFx
directories:
  buildResources: build
files:
  - '**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.prettierignore,.prettierrc.yaml,.editorconfig,dev-app-update.yml,README.md,SPEC.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/**'
  # Development-only artifacts that must never ship inside the app.
  - '!{CONTRIBUTING.md,vitest.config.mts,.gitattributes,vitest.config.mjs}'
  - '!docs/**'
  - '!.github/**'
  - '!coverage/**'
  - '!**/*.test.{ts,tsx}'
  # Ship only the compiled native addon, not its sources or build tree.
  - '!native/**'
  - 'native/build/Release/*.node'
asarUnpack:
  - native/build/Release/*.node
fileAssociations:
  - ext: pdfx
    name: PDFX Collection
    description: PDFX multi-document PDF collection
    role: Viewer
    mimeType: application/x-pdfx
mac:
  category: public.app-category.productivity
win:
  executableName: pdfx
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Office
  maintainer: PDFx Maintainers <maintainers@pdfx.app>
  synopsis: One file. Many documents. Still a PDF.
  description: >-
    PDFx bundles many PDF documents into a single backwards-compatible .pdfx
    file (a valid PDF) and provides a minimal cross-platform viewer and editor.
  icon: build/icon.png
  mimeTypes:
    - application/x-pdfx
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
