name: Windows installer

# Builds the packaged Windows installer (NSIS .exe) on demand and on version tags. The main CI
# workflow already builds it on every push, but only as a short-lived run artifact; this gives a
# one-click manual build and publishes a durable installer to GitHub Releases when you tag a version.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Needed so the tag build can create the GitHub Release and attach the installer.
permissions:
  contents: write

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      # Unsigned build — no code-signing secrets, matching the local and CI builds.
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build the Windows installer
        run: yarn build:win --publish never

      # Always downloadable from the run's "Artifacts" (handy for a manual workflow_dispatch build).
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfx-windows-installer
          path: dist/*-setup.exe
          if-no-files-found: error

      # On a version tag (e.g. v1.2.0), publish the installer to a GitHub Release.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
